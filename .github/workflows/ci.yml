name: Deploy Space Invader

on:
  push:
    branches: [ web ]

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Pygbag
        run: |
          python -m pip install pygbag

      - name: Build Web Version
        run: |
          python -m pygbag --no-preload --build $GITHUB_WORKSPACE/main.py

      - name: Deploy Space Invader to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages
          clean: true
